name: Release (publish to public showcase repo)

# SKELETON. Builds Re:Sputnik for Windows/macOS/Linux in THIS private repo and
# publishes the binaries as a Release in a SEPARATE PUBLIC repo (the showcase:
# releases + docs + issues, no source code).
#
# Relationship to build.yml:
#   - build.yml stays for CI artifact builds (manual dispatch / branch pushes).
#   - This file owns TAG releases. To avoid a double-release, remove the
#     `on: push: tags` trigger AND the "Attach to Release" step from build.yml,
#     OR fold these deltas into build.yml and delete this file.
#
# One-time setup before this works:
#   1. Create the public repo, e.g.  <owner>/re-sputnik  (showcase).
#   2. Create a fine-grained PAT with `contents: write` on ONLY that public repo.
#   3. Add it to THIS repo:  Settings → Secrets → Actions → RELEASE_PAT
#   4. Set the target:       Settings → Variables → Actions → PUBLIC_REPO = <owner>/re-sputnik
#
# Builds are UNSIGNED by default — see the TODO blocks for signing/notarization.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # manual run = build only, no publish (see `if:` on publish step)

permissions:
  contents: read            # GITHUB_TOKEN isn't used to publish (we use RELEASE_PAT cross-repo)

jobs:
  # Gate: a tagged release must not build/publish if the tests fail. Runs once on
  # a single runner (the build matrix below `needs` it), so it's cheap insurance.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - run: python -m compileall -q src
      - run: pytest -q

  build:
    name: ${{ matrix.label }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            asset: Re-Sputnik-windows-x64.exe
          - os: macos-14            # Apple Silicon (arm64)
            label: macOS arm64
            asset: Re-Sputnik-macos-arm64.dmg
          # - os: macos-13          # Intel — uncomment for a second mac build
          #   label: macOS x64
          #   asset: Re-Sputnik-macos-x64.dmg
          - os: ubuntu-22.04        # OLD glibc on purpose → AppImage runs on older distros
            label: Linux x86_64
            asset: Re-Sputnik-linux-x86_64.AppImage

    steps:
      - uses: actions/checkout@v7

      # Single source of truth is src/re_sputnik/__init__.py (__version__). A release
      # tag that disagrees with it is almost always a mistake — fail loudly so the
      # exe's version, the UI, and the tag can never drift apart.
      - name: Verify tag matches __version__
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          file_ver=$(grep -oE '__version__[[:space:]]*=[[:space:]]*"[^"]+"' src/re_sputnik/__init__.py | grep -oE '[0-9][^"]*')
          tag_ver="${GITHUB_REF_NAME#v}"
          echo "file=$file_ver  tag=$tag_ver"
          if [ "$file_ver" != "$tag_ver" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' != __version__ '${file_ver}'. Bump src/re_sputnik/__init__.py or retag."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Linux build deps (Tk + FUSE for AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse2
          python -c "import tkinter; print('tkinter OK', tkinter.TkVersion)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"

      - name: Bake icons (SVG → PNG)
        continue-on-error: true
        run: |
          python scripts/render_icons.py
          python scripts/gen_icons.py

      - name: Generate .icns (macOS app icon)
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          ICONDIR=src/re_sputnik/resources/branding
          SRC_PNG="$ICONDIR/icon_256.png"
          if [ -f "$SRC_PNG" ]; then
            mkdir -p icon.iconset
            for s in 16 32 64 128 256 512; do
              sips -z $s $s "$SRC_PNG" --out "icon.iconset/icon_${s}x${s}.png" >/dev/null 2>&1 || true
              d=$((s*2)); sips -z $d $d "$SRC_PNG" --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null 2>&1 || true
            done
            iconutil -c icns icon.iconset -o "$ICONDIR/icon.icns" || true
          fi

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm re_sputnik.spec

      # ── Windows ──────────────────────────────────────────────────────────────
      # TODO sign: signtool sign /fd sha256 /tr <timestamp-url> /td sha256 \
      #            /f cert.pfx /p ${{ secrets.WINDOWS_CERT_PW }} dist\Re-Sputnik.exe
      - name: Package (Windows → .exe)
        if: runner.os == 'Windows'
        shell: bash
        run: cp "dist/Re-Sputnik.exe" "${{ matrix.asset }}"

      # ── macOS ────────────────────────────────────────────────────────────────
      # TODO sign+notarize before the .dmg:
      #   codesign --deep --force --options runtime --timestamp \
      #            --sign "Developer ID Application: <NAME> (<TEAMID>)" dist/Re-Sputnik.app
      #   xcrun notarytool submit ... --wait   (needs APPLE_ID / APPLE_PW / APPLE_TEAM_ID)
      #   xcrun stapler staple dist/Re-Sputnik.app
      - name: Package (macOS → .dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Re-Sputnik" -srcfolder "dist/Re-Sputnik.app" \
            -ov -format UDZO "${{ matrix.asset }}"

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Package (Linux → AppImage)
        if: runner.os == 'Linux'
        run: |
          set -e
          APP=Re-Sputnik
          mkdir -p AppDir/usr/bin
          cp "dist/$APP" "AppDir/usr/bin/$APP"
          chmod +x "AppDir/usr/bin/$APP"
          ICON=src/re_sputnik/resources/branding/icon_256.png
          if [ -f "$ICON" ]; then cp "$ICON" "AppDir/$APP.png"; else : > "AppDir/$APP.png"; fi
          printf '[Desktop Entry]\nType=Application\nName=Re:Sputnik\nExec=%s\nIcon=%s\nCategories=Network;Utility;\nTerminal=false\n' "$APP" "$APP" > "AppDir/$APP.desktop"
          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/bin/%s" "$@"\n' "$APP" > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "${{ matrix.asset }}"

      - name: Upload CI artifact (always)
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      # Publish ONLY on tag pushes, into the PUBLIC showcase repo via the PAT.
      # Each matrix job appends its own asset to the same tagged Release.
      - name: Publish to public repo (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          repository: ${{ vars.PUBLIC_REPO }}     # e.g. youruser/re-sputnik (public)
          token: ${{ secrets.RELEASE_PAT }}        # fine-grained PAT, contents:write on that repo
          tag_name: ${{ github.ref_name }}
          name: Re:Sputnik ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md              # optional; remove if you don't keep one
          draft: true                              # review assets, then publish manually
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
